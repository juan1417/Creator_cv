# Alembic configuration para Creator CV backend.
#
# La URL real se lee en runtime desde DATABASE_URL vía alembic/env.py.
# Esta entrada queda solo como placeholder para que Alembic no falle al parsear.
[alembic]
script_location = alembic

# Cadena vacía: env.py la reemplaza por la URL efectiva del entorno.
sqlalchemy.url =

# --- Plantilla de mensaje de commit ---
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# Búsqueda del nombre de la rama (opcional, útil con Alembic branches)
# branch_label =

# timezone para create_date (UTC para coherencia con el backend)
timezone = UTC

# max_identifier_length: dejá el default a menos que tu motor tenga límite raro
# max_identifier_length = 63

# --- Truncado de líneas en migrations (estético) ---
truncate_slug_length = 40

# --- Hooks post-rewrite (vacío por ahora) ---
[post_write_hooks]

# --- Configuración de logging ---
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
