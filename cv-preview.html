<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#0a0a0a" />
  <title>Vista previa · Creator CV</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400&display=swap" />
  <link rel="stylesheet" href="/assets/css/app.css" />
</head>
<body>
  <a class="skip-link" href="#main">Saltar al contenido</a>
  <header class="site-header">
    <div class="wrap">
      <a class="brand" href="/">Creator CV</a>
    </div>
  </header>

  <main id="main" class="main-content main-content--doc-preview">
    <div id="flash-root"></div>

    <div class="page-header">
      <a class="page-header__back" href="#" id="back-link">
        <svg class="page-header__back-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
          <path d="M19 12H5M12 19l-7-7 7-7" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        Volver al editor
      </a>
      <p class="breadcrumb">
        <a href="/">Inicio</a> /
        <a href="#" id="bc-edit">Editor</a> /
        <span aria-current="page">Vista previa</span>
      </p>
    </div>

    <p class="eyebrow preview-doc-title">Vista previa</p>
    <h1>Hoja del CV</h1>
    <p class="help preview-doc-help">Vista previa en <strong>una columna</strong> (estilo Harvard, todo el texto en negro sobre la hoja A4).</p>

    <div class="preview-doc-stage" aria-label="Vista previa del CV">
      <div class="cv-paper">
        <div class="cv-paper-inner cv-ref-doc" id="preview-root"></div>
      </div>
    </div>

    <details class="preview-raw-markdown card">
      <summary>Fuente Markdown</summary>
      <pre class="preview-pre" id="md-source">(cargando…)</pre>
    </details>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/marked@12.0.0/marked.min.js"></script>
  <script src="/assets/js/storage.js"></script>
  <script src="/assets/js/cv-store.js"></script>
  <script src="/assets/js/shared.js"></script>
  <script src="/assets/js/cv-render.js"></script>
  <script src="/assets/js/markdown.js"></script>
  <script src="/assets/js/preview.js"></script>
</body>
</html>
